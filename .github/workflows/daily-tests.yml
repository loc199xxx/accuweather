name: Daily AccuWeather Tests

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Write Google credentials (neu co secret)
        if: ${{ secrets.GOOGLE_CREDENTIALS_JSON != '' }}
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > config/google_credentials.json

      - name: Run smoke tests (headless)
        run: mvn test -Dsurefire.suiteXmlFiles=testng.xml -Dheadless=true -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports-${{ github.run_number }}
          path: |
            target/cucumber-reports/
            reports/
          retention-days: 30
