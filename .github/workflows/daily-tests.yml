name: Daily AccuWeather Tests

on:
  schedule:
    # Chạy lúc 00:00 UTC mỗi ngày (07:00 sáng giờ Việt Nam)
    - cron: '*/5 * * * *'
  # Cho phép chạy thủ công từ tab Actions trên GitHub
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests (headless)
        env:
          BROWSER: chrome
          HEADLESS: true
          # Nếu dùng Google Sheets, thêm secret vào GitHub repo settings
          # GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: mvn test -Dsurefire.suiteXmlFiles=testng.xml -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports-${{ github.run_number }}
          path: |
            target/cucumber-reports/
            reports/
          retention-days: 30
