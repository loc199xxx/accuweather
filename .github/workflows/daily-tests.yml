name: Daily AccuWeather Tests

on:
  schedule:
    # Chạy lúc 00:00 UTC mỗi ngày (07:00 sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  # Cho phép chạy thủ công từ tab Actions trên GitHub
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Generate Google Credentials File
        env:
          # Gọi dữ liệu từ Secret của GitHub gán vào biến môi trường tên là GCP_KEY
          GCP_KEY: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          # 1. Tạo thư mục config (nếu trong code Java bạn đọc từ thư mục này)
          mkdir -p config
          
          # 2. Đổ nội dung biến GCP_KEY ra thành 1 file vật lý
          echo "$GCP_KEY" > config/google_credentials.json
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Write Google credentials (neu co secret)
        env:
          # Bước 1: Gán secret vào biến môi trường
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        # Bước 2: Kiểm tra điều kiện if qua biến env
        if: env.GOOGLE_CREDS != ''
        run: |
          mkdir -p config
          # Bước 3: Ghi vào file (Dùng dấu ngoặc kép bọc biến để không bị lỗi format JSON)
          echo "$GOOGLE_CREDS" > config/google_credentials.json

      - name: Run smoke tests (headless)
        run: mvn test -Dsurefire.suiteXmlFiles=testng-integration.xml -Dheadless=true -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports-${{ github.run_number }}
          path: |
            target/cucumber-reports/
            reports/
          retention-days: 30
