services:

  # Thu thap du lieu 1 lan (--now)
  scraper:
    build: .
    command: mvn exec:java -Dexec.mainClass=com.accuweather.Scheduler -Dexec.args="--now" -Dheadless=true
    volumes:
      - ./reports:/app/reports
      - ./config:/app/config

  # Thu thap du lieu theo lich (14:59 hang ngay)
  scheduler:
    build: .
    command: mvn exec:java -Dexec.mainClass=com.accuweather.Scheduler -Dheadless=true
    volumes:
      - ./reports:/app/reports
      - ./config:/app/config

  # Smoke tests – khong can Google credentials (@smoke)
  test:
    build: .
    command: mvn test -Dheadless=true
    volumes:
      - ./reports:/app/reports
      - ./target:/app/target

  # Integration tests – can Google credentials (@integration)
  test-integration:
    build: .
    command: mvn test -Dsurefire.suiteXmlFiles=testng-integration.xml -Dheadless=true
    volumes:
      - ./reports:/app/reports
      - ./config:/app/config
      - ./target:/app/target
